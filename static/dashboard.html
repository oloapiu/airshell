<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AirShell Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
    --blue: #58a6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 16px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 1.4rem; font-weight: 600; }
  header .status {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-left: auto;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
  }
  .card .label {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .card .value {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .card .unit {
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .smoothing { font-size: 0.65rem; color: var(--text-dim); opacity: 0.7; }
  .card.alarm-raised { border-color: var(--red); }
  .card.alarm-raised .value { color: var(--red); }
  .card.normal .value { color: var(--green); }

  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
    overflow-x: auto;
  }
  .chart-container h3 {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-weight: 500;
  }
  /* uPlot overrides for dark theme */
  .uplot .u-title { color: var(--text) !important; }
  .uplot .u-legend th, .uplot .u-legend td { color: var(--text-dim) !important; }
  /* .uplot .u-series:first-child .u-label { display: none; } */

  .footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.7rem;
    margin-top: 24px;
    padding-bottom: 16px;
  }
  @media (max-width: 600px) {
    body { padding: 10px; }
    .card .value { font-size: 1.5rem; }
    .cards { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <h1>AirShell</h1>
  <span class="status" id="status">Loading...</span>
</header>

<div class="cards">
  <div class="card normal" id="card-co2">
    <div class="label">CO&#8322;</div>
    <div class="value" id="val-co2">---</div>
    <div class="unit">ppm <span class="smoothing" id="smooth-co2"></span></div>
  </div>
  <div class="card normal" id="card-pm25">
    <div class="label">PM2.5</div>
    <div class="value" id="val-pm25">---</div>
    <div class="unit">&micro;g/m&sup3; <span class="smoothing" id="smooth-pm25"></span></div>
  </div>
  <div class="card normal" id="card-temp">
    <div class="label">Temperature</div>
    <div class="value" id="val-temp">---</div>
    <div class="unit">&deg;C <span class="smoothing" id="smooth-temp"></span></div>
  </div>
  <div class="card normal" id="card-humidity">
    <div class="label">Humidity</div>
    <div class="value" id="val-humidity">---</div>
    <div class="unit">%RH <span class="smoothing" id="smooth-humidity"></span></div>
  </div>
</div>

<div class="chart-container">
  <h3>CO&#8322; (ppm)</h3>
  <div id="chart-co2"></div>
</div>
<div class="chart-container">
  <h3>PM2.5 (&micro;g/m&sup3;)</h3>
  <div id="chart-pm25"></div>
</div>
<div class="chart-container">
  <h3>Temperature (&deg;C)</h3>
  <div id="chart-temp"></div>
</div>
<div class="chart-container">
  <h3>Humidity (%RH)</h3>
  <div id="chart-humidity"></div>
</div>

<div class="footer">
  AirShell &mdash; auto-refreshes every 30s
</div>

<script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
<script>
(function() {
  "use strict";

  // Chart instances — destroyed and recreated on data refresh
  var charts = {};

  // Colors
  var COLORS = {
    raise:  "#f0883e",   // orange — alarm raise threshold
    clear:  "#3fb950",   // green  — alarm clear threshold
    co2:      "#58a6ff",
    pm25:     "#d2a8ff",
    temp:     "#f0883e",
    humidity: "#3fb950",
    threshold:"#f8514966",
  };

  // Chart config per measurand
  var CHART_DEFS = [
    { key: "co2",      el: "chart-co2",      label: "CO\u2082",   color: COLORS.co2 },
    { key: "pm25",     el: "chart-pm25",      label: "PM2.5",     color: COLORS.pm25 },
    { key: "temp",     el: "chart-temp",      label: "Temp",      color: COLORS.temp },
    { key: "humidity", el: "chart-humidity",   label: "Humidity",  color: COLORS.humidity },
  ];

  // Map alarm measurands to card keys
  var MEASURAND_MAP = {
    co2: "co2", pm25: "pm25", temp: "temp", humidity: "humidity"
  };

  function chartWidth() {
    // Fit to container width minus padding
    var container = document.querySelector('.chart-container');
    if (container) return container.clientWidth - 32;
    return window.innerWidth - 56;
  }

  function makeThresholdPlugin(thresholds) {
    // thresholds = { raise: [...], clear: [...] }
    return {
      hooks: {
        draw: [function(u) {
          var ctx = u.ctx;
          ctx.save();
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 4]);
          var groups = [{vals: thresholds.raise, color: COLORS.raise},
                        {vals: thresholds.clear, color: COLORS.clear}];
          for (var g = 0; g < groups.length; g++) {
            var grp = groups[g];
            ctx.strokeStyle = grp.color;
            for (var i = 0; i < grp.vals.length; i++) {
              var y = u.valToPos(grp.vals[i], "y", true);
              if (y < u.bbox.top || y > u.bbox.top + u.bbox.height) continue;
              ctx.beginPath();
              ctx.moveTo(u.bbox.left, y);
              ctx.lineTo(u.bbox.left + u.bbox.width, y);
              ctx.stroke();
            }
          }
          ctx.restore();
        }]
      }
    };
  }

  function buildChart(def, ts, values, thresholds) {
    var el = document.getElementById(def.el);
    el.innerHTML = "";

    var w = chartWidth();
    var h = 200;

    var plugins = [];
    if (thresholds && (thresholds.raise.length || thresholds.clear.length)) {
      plugins.push(makeThresholdPlugin(thresholds));
    }

    var opts = {
      width: w,
      height: h,
      plugins: plugins,
      cursor: {
        show: true,
        sync: { key: "airshell-sync" },
      },
      axes: [
        {
          stroke: "#8b949e",
          grid: { stroke: "#30363d44" },
          ticks: { stroke: "#30363d44" },
          values: function(u, vals) {
            return vals.map(function(v) {
              var d = new Date(v * 1000);
              return d.getHours().toString().padStart(2,"0") + ":" +
                     d.getMinutes().toString().padStart(2,"0");
            });
          }
        },
        {
          stroke: "#8b949e",
          grid: { stroke: "#30363d44" },
          ticks: { stroke: "#30363d44" },
          range: function(u, dataMin, dataMax) {
            var lo = dataMin, hi = dataMax;
            if (thresholds) {
              var allT = thresholds.raise.concat(thresholds.clear);
              for (var t = 0; t < allT.length; t++) {
                if (allT[t] < lo) lo = allT[t];
                if (allT[t] > hi) hi = allT[t];
              }
            }
            var span = hi - lo;
            if (span < 1) span = 1;
            return [lo - span * 0.1, hi + span * 0.1];
          },
        }
      ],
      series: [
        {
          label: "Time",
          value: function(u, ts) {
            if (ts == null) return "—";
            var d = new Date(ts * 1000);
            return d.getHours().toString().padStart(2,"0") + ":" +
                   d.getMinutes().toString().padStart(2,"0");
          },
        },
        {
          label: def.label,
          stroke: def.color,
          width: 2,
          fill: def.color + "18",
        }
      ],
    };

    var data = [ts, values];
    charts[def.key] = new uPlot(opts, data, el);
  }

  function getThresholds(alarmsCfg, measurand) {
    var result = { raise: [], clear: [] };
    if (!alarmsCfg) return result;
    var keys = Object.keys(alarmsCfg);
    for (var i = 0; i < keys.length; i++) {
      var a = alarmsCfg[keys[i]];
      if (a.measurand === measurand) {
        if (a.raise != null) result.raise.push(a.raise);
        if (a.clear != null) result.clear.push(a.clear);
      }
    }
    return result;
  }

  function getSmoothing(alarmsCfg, measurand) {
    if (!alarmsCfg) return null;
    var keys = Object.keys(alarmsCfg);
    for (var i = 0; i < keys.length; i++) {
      var a = alarmsCfg[keys[i]];
      if (a.measurand === measurand && a.smoothing_min != null) {
        return a.smoothing_min;
      }
    }
    return null;
  }

  function rollingAvg(arr, window) {
    // Return rolling average of last `window` non-null values
    if (!arr || !window || window <= 1) return null;
    var vals = [];
    for (var i = arr.length - 1; i >= 0 && vals.length < window; i--) {
      if (arr[i] != null) vals.push(arr[i]);
    }
    if (vals.length === 0) return null;
    return vals.reduce(function(a, b) { return a + b; }, 0) / vals.length;
  }

  function updateCards(data, alarmStates, alarmsCfg) {
    var cardDefs = [
      { key: "co2",      id: "card-co2",      valId: "val-co2",      smoothId: "smooth-co2",      fmt: function(v){return Math.round(v);} },
      { key: "pm25",     id: "card-pm25",      valId: "val-pm25",     smoothId: "smooth-pm25",     fmt: function(v){return v.toFixed(1);} },
      { key: "temp",     id: "card-temp",      valId: "val-temp",     smoothId: "smooth-temp",     fmt: function(v){return v.toFixed(1);} },
      { key: "humidity", id: "card-humidity",   valId: "val-humidity", smoothId: "smooth-humidity", fmt: function(v){return v.toFixed(1);} },
    ];

    for (var i = 0; i < cardDefs.length; i++) {
      var cd = cardDefs[i];
      var arr = data[cd.key];
      var smoothWin = getSmoothing(alarmsCfg, cd.key);
      // Use rolling average matching the alarm smoothing window; fall back to last raw value
      var val = rollingAvg(arr, smoothWin);
      if (val === null && arr) {
        for (var j = arr.length - 1; j >= 0; j--) {
          if (arr[j] != null) { val = arr[j]; break; }
        }
      }

      var valEl = document.getElementById(cd.valId);
      var cardEl = document.getElementById(cd.id);

      if (val != null) {
        valEl.textContent = cd.fmt(val);
      } else {
        valEl.textContent = "---";
      }

      // Check if any alarm for this measurand is raised
      var raised = false;
      if (alarmStates) {
        var keys = Object.keys(alarmStates);
        for (var k = 0; k < keys.length; k++) {
          if (keys[k].indexOf(cd.key) !== -1 && alarmStates[keys[k]]) {
            raised = true;
            break;
          }
        }
      }
      cardEl.className = "card " + (raised ? "alarm-raised" : "normal");

      // Smoothing label
      var smoothEl = document.getElementById(cd.smoothId);
      if (smoothEl) {
        var s = getSmoothing(alarmsCfg, cd.key);
        smoothEl.textContent = s ? s + "m avg" : "";
      }
    }
  }

  function refresh() {
    fetch("/api/readings?last=2h")
      .then(function(r) { return r.json(); })
      .then(function(resp) {
        var data = resp.data;
        var alarms = resp.alarms;
        var alarmStates = resp.alarm_states;

        if (!data || !data.ts || data.ts.length === 0) {
          document.getElementById("status").textContent = "No data yet";
          return;
        }

        updateCards(data, alarmStates, alarms);

        for (var i = 0; i < CHART_DEFS.length; i++) {
          var def = CHART_DEFS[i];
          var thresholds = getThresholds(alarms, def.key);
          buildChart(def, data.ts, data[def.key], thresholds);
        }

        var lastTs = data.ts[data.ts.length - 1];
        var ago = Math.round((Date.now() / 1000 - lastTs) / 60);
        var statusText = ago <= 1 ? "Live" : ago + " min ago";
        document.getElementById("status").textContent =
          statusText + " \u00b7 " + data.ts.length + " readings";
      })
      .catch(function(err) {
        document.getElementById("status").textContent = "Error: " + err.message;
      });
  }

  // Initial load + auto-refresh
  refresh();
  setInterval(refresh, 30000);

  // Resize charts on window resize
  var resizeTimer;
  window.addEventListener("resize", function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      var keys = Object.keys(charts);
      for (var i = 0; i < keys.length; i++) {
        charts[keys[i]].setSize({ width: chartWidth(), height: 200 });
      }
    }, 200);
  });
})();
</script>
</body>
</html>
